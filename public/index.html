<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBPAZ Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel" aria-label="OBPAZ Chat">
        <header class="topbar">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M20.8 5.2c-2.9.2-5.2 1.1-7 2.8l-1.2 1.1-2.1-2.4a4.8 4.8 0 0 0-5.4-1.3l3.4 4.9-5.7 1.2 5.1 2.7a6.2 6.2 0 0 0 5.8-.1l1.1-.6-.7 4.9 2.7-1.9a5.2 5.2 0 0 0 2.1-4.8l-.3-2 3.4-3.4c.6-.6.1-1.2-1.2-1.1ZM7.2 17.4c1.8.4 3.4.3 4.9-.4-1.1 1.5-2.8 2.3-5.2 2.5a.7.7 0 0 1-.5-1.2l.8-.9Z" />
            </svg>
          </div>
          <div class="title-block">
            <h1>OBPAZ Chat</h1>
            <p id="status">Carregando serviço</p>
          </div>
          <span class="status-pill">Online</span>
        </header>

        <div class="messages" id="messages" aria-live="polite"></div>

        <div class="suggestions" id="suggestions" aria-label="Sugestões"></div>

        <form class="composer" id="composer">
          <textarea
            id="messageInput"
            placeholder="Pergunte sobre paz, conflitos, direitos humanos..."
            rows="1"
          ></textarea>
          <button type="submit" aria-label="Enviar mensagem" title="Enviar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3.4 20.4 21 12 3.4 3.6l1.7 6.5 8.8 1.9-8.8 1.9-1.7 6.5Z" />
            </svg>
          </button>
        </form>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
